services:
  api:
    build:
      context: ./apps/api
      dockerfile: docker/Dockerfile
    container_name: csv_import_fixer_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/data/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  worker:
    build:
      context: ./apps/api
      dockerfile: docker/Dockerfile
    container_name: csv_import_fixer_worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/data/storage
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: csv_import_fixer_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-csv_import_fixer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-csv_import_fixer}
      POSTGRES_DB: ${POSTGRES_DB:-csv_import_fixer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-csv_import_fixer} -d ${POSTGRES_DB:-csv_import_fixer}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: csv_import_fixer_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  storage_data:
